  <!-- Initial inside circle -->
  <text x="30" y="35" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="white" font-weight="bold">
    NF
  </text>
  <!-- Full text -->
  <text x="70" y="38" font-size="24" font-family="Arial, Helvetica, sans-serif" fill="url(#grad1)" font-weight="bold">
